name: CI/CD\non: [push, pull_request, workflow_dispatch]\njobs:\n  lint-test-build:\n    runs-on: ubuntu-latest\n    steps:\n      - uses: actions/checkout@v4\n      - uses: nx-cloud/action@v1\n      - uses: actions/setup-node@v4\n        with:\n          node-version: 22\n          cache: 'npm'\n      - run: npm ci\n      - run: npx nx affected:lint --ci\n      - run: npx nx affected:test --ci\n      - run: npx nx affected:e2e --ci\n      - run: npx nx affected:build --ci\n  deploy:\n    needs: lint-test-build\n    if: github.ref == 'refs/heads/main'\n    runs-on: ubuntu-latest\n    steps:\n      - run: echo "Deploy to Vercel/EAS"